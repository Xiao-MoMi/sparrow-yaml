test: &test
  empty_list: []
  empty_config: {}
  null: ~
  string-1: "test"
  string-2: 'test'
  string-3: test
  quoted: "So does this
              quoted 
          scalar.\n"
  string_literal: |
    123
    321
  string_literal_remove_end_newline: |-
    123
    321
  string_folded: >
    123
    321
  string_folded_remove_end_newline: >-
    123
    321
  long: 1000
  int: 1314
  short: 1
  double: 0.0
  int_to_double: 0
  float: 0.0
  int_to_float: 0
  boolean: false
  # 常规注释
  string_list:
    # 节点前部注释
    - # 节点内部注释
      "qwq" # 节点行内注释
    # 节点后部注释
    # 节点中注释
    - "awa" # 列表内部注释
    # 前注释
    - # 行中注释
      map: "value" # 值注释
      # 仍然注释
      nested: # 嵌套注释
        - "fwf" # 嵌套的值注释
        - # 还有注释
          map: "value"
    # 列表尾部注释
  string_list_folded: [ "qwq", "awa" ]
  config_list:
    - string: "test"
  config_list_in_config_list:
    - config_list:
        - string: "qwq"

test_anchor: *test
# 注释0
test_anchor_add:
  # 注释1
  qwq: "qwq"
  # 注释2
  <<: # 注释3
    *test

# 常规注释
comment: "qwq"
comment_inline: "qwq" # 行内注释

